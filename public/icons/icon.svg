<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#07111D"/>

  <!-- Subtle grid pattern (gramado) -->
  <rect width="512" height="512" rx="96" fill="url(#grid)" opacity="0.15"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00D166" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Green accent ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#00D166" stroke-width="3" opacity="0.2"/>

  <!-- Football ⚽ -->
  <text x="256" y="310"
        font-size="200"
        text-anchor="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">⚽</text>

  <!-- "BOLÃO" text at bottom -->
  <text x="256" y="430"
        font-family="Oswald, Arial Narrow, sans-serif"
        font-weight="700"
        font-size="52"
        letter-spacing="12"
        fill="#00D166"
        text-anchor="middle">BOLÃO</text>
</svg>
